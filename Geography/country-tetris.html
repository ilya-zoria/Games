<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Maker World — Country Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#9adcff;
    --sky-bot:#d8f3ff;
    --night-top:#16235e;
    --night-bot:#2c3f8f;
    --grass:#8fd05f;
    --grass-side:#5da23c;
    --dirt:#a9744a;
    --wood:#c98c5a;
    --wood-dark:#a96f42;
    --cream:#fff6e3;
    --ink:#5b3a21;
    --red:#ef5d54;
    --blue:#3aa7e8;
    --paper:#fdf3da;
    --paper-side:#cdbb93;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Baloo 2','Arial Rounded MT Bold','Trebuchet MS',sans-serif;
    background:linear-gradient(180deg,var(--sky-top),var(--sky-bot) 70%,#eafaf0);
    color:var(--ink);
    min-height:100%;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none}
  a.home-link{
    position:fixed;left:14px;top:14px;z-index:200;
    padding:9px 16px;font-size:16px;font-weight:700;border-radius:18px;
    background:var(--cream);color:var(--ink);text-decoration:none;
    box-shadow:0 4px 0 var(--paper-side), 0 8px 14px rgba(60,90,140,.18);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  a.home-link:hover{filter:brightness(1.04)}
  a.home-link:active{transform:translateY(3px);box-shadow:0 1px 0 var(--paper-side),0 4px 8px rgba(60,90,140,.18)}
  .hidden{display:none !important}

  /* ---------- toy buttons ---------- */
  .toy{
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 4px 0 var(--paper-side), 0 8px 14px rgba(60,90,140,.18);
    color:var(--ink);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .toy:active{transform:translateY(3px);box-shadow:0 1px 0 var(--paper-side),0 4px 8px rgba(60,90,140,.18)}
  .toy:hover{filter:brightness(1.04)}

  /* ---------- MENU ---------- */
  #menu{max-width:1020px;margin:0 auto;padding:30px 20px 60px;text-align:center}
  .logo{
    font-size:clamp(36px,6vw,60px);font-weight:800;line-height:1.02;
    color:#fff;
    text-shadow:0 3px 0 #3f8fc4, 0 7px 16px rgba(30,80,130,.35);
    letter-spacing:.5px;
  }
  .logo .globe{display:inline-block;transform:rotate(-10deg)}
  .tagline{margin-top:10px;font-size:18px;color:#2a6a96;font-weight:600}
  .menu-grid{
    margin-top:28px;display:grid;gap:18px;
    grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  }
  .region-card{
    background:var(--cream);
    border-radius:24px;padding:14px 14px 12px;text-align:left;
    box-shadow:0 6px 0 var(--paper-side), 0 14px 24px rgba(60,90,140,.2);
    transition:transform .15s ease;
  }
  .region-card:hover,.region-card:focus-visible{transform:translateY(-5px) rotate(-.5deg);outline:none}
  .region-card:active{transform:translateY(0)}
  .region-card .rc-sky{
    background:linear-gradient(180deg,#aee2ff,#e3f6ff);
    border-radius:16px;padding:6px;
  }
  .region-card svg{width:100%;height:128px;display:block}
  .region-card .rc-name{font-size:22px;font-weight:800;margin-top:10px;color:var(--ink)}
  .region-card .rc-count{font-size:14px;color:#9b7c5e;font-weight:600}
  .menu-opts{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .chip{padding:10px 20px;font-size:16px;font-weight:700;border-radius:999px}
  .chip[aria-pressed="true"]{background:#ffd95e;box-shadow:0 4px 0 #d9a93c,0 8px 14px rgba(60,90,140,.18)}

  /* ---------- GAME ---------- */
  #game{max-width:1600px;margin:0 auto;padding:10px 16px 22px}
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 2px 12px}
  .tb-btn{padding:9px 16px;font-size:16px;font-weight:700}
  .tb-title{
    font-size:26px;font-weight:800;margin-right:auto;color:#fff;
    text-shadow:0 2px 0 #3f8fc4,0 5px 10px rgba(30,80,130,.3);
  }
  .stat{background:var(--cream);border-radius:16px;padding:8px 15px;font-size:16px;font-weight:700;
    box-shadow:0 4px 0 var(--paper-side)}
  .stat b{color:var(--red)}

  .board-wrap{
    position:relative;border-radius:28px;overflow:hidden;
    background:linear-gradient(180deg,#eaf3ee 0%,#dceee3 100%);
    box-shadow:inset 0 0 0 6px rgba(255,255,255,.55), 0 16px 30px rgba(60,90,140,.25);
    transition:background 1s ease;
  }
  body.night .board-wrap{
    background:linear-gradient(180deg,#2a3358 0%,#1f2747 100%);
  }
  body.night{background:linear-gradient(180deg,#1a2a6e,#33458f 70%,#27543a)}
  body.night .logo,body.night .tb-title{text-shadow:0 3px 0 #101b4d,0 7px 16px rgba(0,0,20,.5)}
  body.night .tagline{color:#bcd0ff}
  #board{display:block;width:100%;height:auto;max-height:78vh;touch-action:none;user-select:none}

  .now-card{
    position:absolute;left:16px;top:14px;max-width:320px;
    background:var(--cream);
    border-radius:18px;padding:10px 18px;
    box-shadow:0 5px 0 var(--paper-side),0 10px 18px rgba(60,90,140,.25);
    pointer-events:none;
  }
  .now-card .nc-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b08d63;font-weight:700}
  .now-card .nc-name{font-size:25px;font-weight:800;color:var(--ink);line-height:1.12}
  .now-card .nc-flag{font-size:25px;margin-right:7px;vertical-align:-2px}

  .toast{
    position:absolute;left:50%;top:16px;transform:translateX(-50%) scale(.8);
    background:#ffd95e;color:#6b4a00;font-weight:800;font-size:19px;
    border-radius:999px;padding:10px 24px;opacity:0;pointer-events:none;
    box-shadow:0 4px 0 #d9a93c,0 10px 18px rgba(60,90,140,.25);
    transition:opacity .18s ease, transform .18s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) scale(1)}

  .controls{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:16px}
  .ctl{min-width:64px;padding:13px 17px;font-size:21px;font-weight:800;border-radius:18px}
  .ctl.small{font-size:16px;font-weight:700;padding:13px 18px}
  .keys-hint{width:100%;text-align:center;font-size:13px;color:#4a7da3;font-weight:600;margin-top:4px}
  body.night .keys-hint{color:#b9c8f5}

  /* ---------- SVG pieces ---------- */
  .slot-top{fill:var(--paper);stroke:#bca87e;stroke-width:1.1;stroke-dasharray:5 3}
  .slot-side{fill:#000;opacity:.16;filter:blur(4px)}
  .slot-top.deco{fill:#e7d9b4;stroke-dasharray:none}
  .slot-top.hint{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{fill:var(--paper)}50%{fill:#ffe084}}
  .placed-top{stroke:rgba(255,255,255,.9);stroke-width:1.4}
  .placed-side{fill:#000;opacity:.18;filter:blur(4px)}
  .placed-label{
    font-size:13px;font-weight:800;fill:#4d3318;paint-order:stroke;
    stroke:rgba(255,250,235,.9);stroke-width:3px;
    pointer-events:none;text-anchor:middle;
  }
  #piece{cursor:grab;filter:drop-shadow(0 6px 7px rgba(40,60,90,.28))}
  #piece.grabbed{cursor:grabbing}
  #piece .p-top{stroke:rgba(255,255,255,.95);stroke-width:1.8}
  #piece .p-side{fill:#000;opacity:.14;filter:blur(4px)}
  .cloud{fill:#fff;opacity:.92}
  body.night .cloud{fill:#8fa2e0;opacity:.5}
  .star{fill:#fff;opacity:0}
  body.night .star{opacity:.9}
  @keyframes drift1{from{transform:translateX(-220px)}to{transform:translateX(1400px)}}
  @keyframes drift2{from{transform:translateX(-340px)}to{transform:translateX(1400px)}}
  .cloud.c1{animation:drift1 70s linear infinite}
  .cloud.c2{animation:drift2 95s linear infinite}
  .cloud.c3{animation:drift1 120s linear infinite;animation-delay:-40s}

  @keyframes popIn{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .pop{animation:popIn .45s ease both;transform-origin:center;transform-box:fill-box}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  /* ---------- DONE ---------- */
  #done{max-width:560px;margin:60px auto;padding:0 20px;text-align:center}
  .done-card{background:var(--cream);border-radius:28px;padding:38px 26px;
    box-shadow:0 8px 0 var(--paper-side),0 20px 34px rgba(60,90,140,.3)}
  .done-card h2{font-size:36px;font-weight:800}
  .stars{font-size:48px;letter-spacing:8px;margin:12px 0 4px;color:#f6b73c}
  .done-stats{font-size:17px;color:#9b7c5e;font-weight:600;margin-bottom:24px}
  .big-btn{font-size:20px;font-weight:800;border-radius:18px;padding:15px 28px;margin:6px;background:#ffd95e;
    box-shadow:0 5px 0 #d9a93c,0 10px 18px rgba(60,90,140,.2)}
  .big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #d9a93c}
  .big-btn.alt{background:var(--cream);box-shadow:0 5px 0 var(--paper-side),0 10px 18px rgba(60,90,140,.2)}
  .big-btn.alt:active{box-shadow:0 2px 0 var(--paper-side)}

  @media (prefers-reduced-motion:reduce){
    .pop,.slot-top.hint{animation:none}
  }
  @media (max-width:640px){
    .now-card{position:static;max-width:none;margin:0 0 10px;pointer-events:auto}
  }
</style>
</head>
<body>
<a class="home-link" href="/index.html">← All Games</a>

<!-- ================= MENU ================= -->
<div id="menu">
  <h1 class="logo"><span class="globe">🌍</span> Map Maker World</h1>
  <p class="tagline">Catch the flying countries and snap them into your toy world — like Tetris, but you build the planet!</p>
  <div class="menu-grid" id="menuGrid"></div>
  <div class="menu-opts">
    <button class="chip toy" id="optSpin" aria-pressed="true">🌀 Spinning pieces: ON</button>
    <button class="chip toy" id="optSound" aria-pressed="true">🔊 Sound: ON</button>
    <button class="chip toy" id="optNight" aria-pressed="false">🌞 Day</button>
  </div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="hidden">
  <div class="topbar">
    <button class="tb-btn toy" id="btnBack">← Regions</button>
    <div class="tb-title" id="gTitle">Europe</div>
    <div class="stat">⭐ <b id="gScore">0</b></div>
    <div class="stat">🧩 <b id="gProg">0/0</b></div>
    <button class="tb-btn toy" id="btnFull">⛶</button>
    <button class="tb-btn toy" id="btnNight2">🌞</button>
    <button class="tb-btn toy" id="btnSound2">🔊</button>
  </div>
  <div class="board-wrap">
    <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="now-card" id="nowCard">
      <div class="nc-label">Now flying</div>
      <div class="nc-name"><span class="nc-flag" id="ncFlag"></span><span id="ncName"></span></div>
    </div>
    <div class="toast" id="toast">Nice!</div>
  </div>
  <div class="controls">
    <button class="ctl toy" id="cLeft"  aria-label="Move left">←</button>
    <button class="ctl toy" id="cUp"    aria-label="Move up">↑</button>
    <button class="ctl toy" id="cDown"  aria-label="Move down">↓</button>
    <button class="ctl toy" id="cRight" aria-label="Move right">→</button>
    <button class="ctl toy" id="cRotL"  aria-label="Rotate left">⟲</button>
    <button class="ctl toy" id="cRotR"  aria-label="Rotate right">⟳</button>
    <button class="ctl small toy" id="cHint">💡 Hint</button>
    <button class="ctl small toy" id="cSkip">⏭ Skip</button>
    <div class="keys-hint">Drag with mouse or finger · Arrows move · SPACE / Z / X rotate · H hint · S skip</div>
  </div>
</div>

<!-- ================= DONE ================= -->
<div id="done" class="hidden">
  <div class="done-card">
    <h2 id="doneTitle">Europe complete!</h2>
    <div class="stars" id="doneStars">★★★</div>
    <div class="done-stats" id="doneStats"></div>
    <button class="big-btn" id="btnAgain">Play again</button>
    <button class="big-btn alt" id="btnMenu">Choose region</button>
  </div>
</div>

/* ---------- 2D view helpers ----------
   flat map, toy "block" extrusion drops straight down            */
function makeView(rd){
  const s = Math.min(1040/rd.w, 760/rd.h);
  const RUN = 300;                    // launch runway on the left (screen px)
  const PAD = 28;
  const tx = RUN, ty = PAD;
  const depth = 9/s;                  // country tile extrusion (→ 9px on screen)
  const base = 26/s;
  return {
    s, tx, ty, depth, base,
    vbW: RUN + rd.w*s + PAD,
    vbH: ty + rd.h*s + 12 + PAD,
    toScreen: p => ({x:p.x*s+tx, y:p.y*s+ty}),
    toMap: p => ({x:(p.x-tx)/s, y:(p.y-ty)/s}),
    mapRight:{x:1/s, y:0},
    mapDown: {x:0,   y:1/s}
  };
}

/* ---------- audio ---------- */
let AC=null;
function beep(freq,dur=0.09,type='triangle',vol=0.18,when=0){
  if(!soundOn) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+when+dur);
    o.connect(g).connect(AC.destination);
    o.start(AC.currentTime+when);o.stop(AC.currentTime+when+dur+0.02);
  }catch(e){}
}
const sndRotate=()=>beep(420,0.05,'square',0.07);
const sndSnap  =()=>{beep(523,0.1);beep(784,0.14,'triangle',0.18,0.09);};
const sndWin   =()=>[523,659,784,1047].forEach((f,i)=>beep(f,0.16,'triangle',0.2,i*0.13));
const sndSkip  =()=>beep(240,0.1,'sawtooth',0.06);

/* ---------- game setup ---------- */
function chunkShuffle(arr,size){
  const out=[];
  for(let i=0;i<arr.length;i+=size){
    const chunk=arr.slice(i,i+size);
    for(let j=chunk.length-1;j>0;j--){
      const k=Math.floor(Math.random()*(j+1));[chunk[j],chunk[k]]=[chunk[k],chunk[j]];
    }
    out.push(...chunk);
  }
  return out;
}

function startGame(region){
  const rd=DATA[region];
  const queue=chunkShuffle(rd.countries.filter(c=>!c.deco),6);
  const V=makeView(rd);
  G={
    region, rd, V, queue, idx:0, score:0, placed:0,
    hintsUsed:0, skips:0, colorI:0,
    piece:null, hintTimer:null, raf:null, lastT:0,
    keys:{}
  };
  $('menu').classList.add('hidden');$('done').classList.add('hidden');
  $('game').classList.remove('hidden');
  $('gTitle').textContent=`${REGION_EMOJI[region]||''} ${region}`;
  $('gScore').textContent='0';
  buildBoard();
  nextPiece();
  G.lastT=performance.now();
  G.raf=requestAnimationFrame(tick);
}

const cssId=s=>s.replace(/[^a-z0-9]/gi,'_');

function buildBoard(){
  const svg=$('board'), rd=G.rd, V=G.V;
  svg.setAttribute('viewBox',`0 0 ${V.vbW} ${V.vbH}`);
  const world=`translate(${V.tx},${V.ty}) scale(${V.s})`;

  /* just the map: extruded country tiles on a simple background */
  let html=`<g transform="${world}">`;
  for(const c of rd.countries){
    html+=`<path class="slot-side" d="${c.d}" transform="translate(0,${V.depth})"/>`;
  }
  for(const c of rd.countries){
    html+=`<path id="slot-${cssId(c.n)}" class="slot-top ${c.deco?'deco':''}" d="${c.d}"/>`;
  }
  html+=`<g id="placedG"></g></g>`;
  html+=`<g id="labelG"></g><g id="fxG"></g><g id="worldPiece" transform="${world}"><g id="pieceHolder"></g></g>`;
  svg.innerHTML=html;
  updateProg();
}

/* ---------- pieces ---------- */
function nextPiece(){
  clearTimeout(G.hintTimer);
  if(G.idx>=G.queue.length){finish();return;}
  const c=G.queue[G.idx];
  const startRot=spinOn?((Math.floor(Math.random()*11)-5)*15||30):0;
  const V=G.V;
  const spawn=V.toMap({x:70, y:V.vbH*0.32});
  G.piece={
    c, x:spawn.x, y:spawn.y,
    rot:startRot, dragging:false, placedAt:performance.now()
  };
  const [top,side]=PALETTE[G.colorI%PALETTE.length];
  $('pieceHolder').innerHTML=`<g id="piece">
    <path class="p-side" d="${c.d}" transform="translate(0,${V.depth*0.9})"/>
    <path class="p-top" d="${c.d}" fill="${top}"/>
  </g>`;
  drawPiece();
  $('ncName').textContent=NICE[c.n]||c.n;
  $('ncFlag').textContent=flagEmoji(c.iso);
  G.hintTimer=setTimeout(()=>showHint(false),14000);
  attachPieceDrag();
}

function drawPiece(){
  const p=G.piece; if(!p) return;
  const g=$('piece'); if(!g) return;
  g.setAttribute('transform',
    `translate(${p.x-p.c.cx},${p.y-p.c.cy}) rotate(${p.rot},${p.c.cx},${p.c.cy})`);
}

function tolerance(c){ return Math.max(16, Math.sqrt(c.a)*0.45); }
function angDiff(a){ a=((a%360)+360)%360; return Math.min(a,360-a); }

function trySnap(){
  const p=G.piece, c=p.c;
  const d=Math.hypot(p.x-c.cx,p.y-c.cy);
  if(d<tolerance(c) && angDiff(p.rot)<=14){snap();return true;}
  return false;
}

function snap(){
  const p=G.piece, c=p.c, V=G.V;
  clearTimeout(G.hintTimer);
  const [top,side]=PALETTE[G.colorI++%PALETTE.length];
  const slot=$('slot-'+cssId(c.n));
  slot.classList.remove('hint');
  $('placedG').insertAdjacentHTML('beforeend',
    `<g class="pop">
       <path class="placed-side" d="${c.d}" transform="translate(0,${V.depth*0.7})"/>
       <path class="placed-top" d="${c.d}" fill="${top}"/>
     </g>`);
  $('pieceHolder').innerHTML='';
  const sc=V.toScreen({x:c.cx,y:c.cy});
  if(Math.sqrt(c.a)*V.s>26){
    $('labelG').insertAdjacentHTML('beforeend',
      `<text class="placed-label pop" x="${sc.x}" y="${sc.y-V.depth*V.s*0.6+4}">${NICE[c.n]||c.n}</text>`);
  }
  confetti(sc);
  sndSnap();
  const secs=(performance.now()-p.placedAt)/1000;
  const pts=Math.max(20, 100-Math.floor(secs)*4-(p.hinted?30:0));
  G.score+=pts; G.placed++;
  $('gScore').textContent=G.score;
  showToast(pickPraise()+`  +${pts}`);
  updateProg();
  G.piece=null; G.idx++;
  setTimeout(nextPiece,650);
}

function showHint(manual=true){
  const p=G.piece; if(!p) return;
  p.hinted=true;
  if(manual) G.hintsUsed++;
  const slot=$('slot-'+cssId(p.c.n));
  slot.classList.add('hint');
  setTimeout(()=>slot && slot.classList.remove('hint'),4000);
}

function skipPiece(){
  if(!G.piece) return;
  sndSkip(); G.skips++;
  G.queue.push(G.queue[G.idx]);
  G.queue.splice(G.idx,1);
  $('pieceHolder').innerHTML='';
  G.piece=null;
  nextPiece();
}

const PRAISE=['Nice!','Great fit!','Perfect!','You got it!','Awesome!','Boom!','Map master!'];
const pickPraise=()=>PRAISE[Math.floor(Math.random()*PRAISE.length)];
let toastT=null;
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1400);
}

function confetti(at){
  const fx=$('fxG');
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2, r=24+Math.random()*60;
    const col=PALETTE[Math.floor(Math.random()*PALETTE.length)][0];
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',at.x);c.setAttribute('cy',at.y);
    c.setAttribute('r',2.5+Math.random()*3.2);c.setAttribute('fill',col);
    fx.appendChild(c);
    c.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${Math.cos(a)*r}px,${Math.sin(a)*r-16}px)`,opacity:0}
    ],{duration:650+Math.random()*250,easing:'cubic-bezier(.2,.7,.3,1)'})
     .onfinish=()=>c.remove();
  }
}

/* ---------- main loop (screen-space motion, map-space state) ---------- */
function tick(t){
  if(!G){return}
  const dt=Math.min(0.05,(t-G.lastT)/1000);G.lastT=t;
  const p=G.piece, V=G.V;
  if(p && !p.dragging){
    const drift=30*dt, sp=180*dt;
    let dx=drift, dy=0;
    if(G.keys.ArrowLeft) dx-=sp;
    if(G.keys.ArrowRight)dx+=sp;
    if(G.keys.ArrowUp)   dy-=sp;
    if(G.keys.ArrowDown) dy+=sp;
    p.x+=V.mapRight.x*dx + V.mapDown.x*dy;
    p.y+=V.mapRight.y*dx + V.mapDown.y*dy;
    // clamp / wrap in screen space
    const sc=V.toScreen(p);
    if(sc.x>V.vbW+60){const m=V.toMap({x:-50,y:sc.y});p.x=m.x;p.y=m.y;}
    if(sc.y<16||sc.y>V.vbH-16){
      const m=V.toMap({x:sc.x,y:Math.max(16,Math.min(V.vbH-16,sc.y))});
      p.x=m.x;p.y=m.y;
    }
    drawPiece();
    trySnap();
  }
  G.raf=requestAnimationFrame(tick);
}

/* ---------- input ---------- */
function rotate(dir){
  const p=G && G.piece; if(!p)return;
  p.rot+=dir*15; sndRotate(); drawPiece(); trySnap();
}
document.addEventListener('keydown',e=>{
  if(!G || $('game').classList.contains('hidden'))return;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    G.keys[e.key]=true;e.preventDefault();
  }
  else if(e.code==='Space'){rotate(1);e.preventDefault();}
  else if(e.key==='z'||e.key==='Z')rotate(-1);
  else if(e.key==='x'||e.key==='X')rotate(1);
  else if(e.key==='h'||e.key==='H')showHint();
  else if(e.key==='s'||e.key==='S')skipPiece();
});
document.addEventListener('keyup',e=>{if(G)G.keys[e.key]=false;});

function svgPoint(evt){
  const svg=$('board'),pt=svg.createSVGPoint();
  pt.x=evt.clientX;pt.y=evt.clientY;
  const sp=pt.matrixTransform(svg.getScreenCTM().inverse()); // screen(viewBox) coords
  return G.V.toMap(sp);                                       // → map space
}
function attachPieceDrag(){
  const g=$('piece');if(!g)return;
  let lastTap=0;
  g.addEventListener('pointerdown',e=>{
    const p=G.piece;if(!p)return;
    const now=Date.now();
    if(now-lastTap<300)rotate(1);   // double-tap rotates
    lastTap=now;
    p.dragging=true;g.classList.add('grabbed');
    g.setPointerCapture(e.pointerId);
    const m=svgPoint(e);
    p.dx=p.x-m.x;p.dy=p.y-m.y;
    e.preventDefault();
  });
  g.addEventListener('pointermove',e=>{
    const p=G.piece;if(!p||!p.dragging)return;
    const m=svgPoint(e);
    p.x=m.x+p.dx;p.y=m.y+p.dy;
    drawPiece();trySnap();
  });
  const up=()=>{
    const p=G.piece;if(!p)return;
    p.dragging=false;g.classList.remove('grabbed');
  };
  g.addEventListener('pointerup',up);
  g.addEventListener('pointercancel',up);
}

/* press-and-hold buttons (screen-space nudges) */
function holdBtn(id,fn,every=70){
  const el=$(id);let iv=null;
  const start=e=>{e.preventDefault();fn();iv=setInterval(fn,every);};
  const stop=()=>{clearInterval(iv);iv=null;};
  el.addEventListener('pointerdown',start);
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,stop));
}
function nudge(dx,dy){
  const p=G&&G.piece;if(!p)return;
  const V=G.V;
  p.x+=V.mapRight.x*dx + V.mapDown.x*dy;
  p.y+=V.mapRight.y*dx + V.mapDown.y*dy;
  drawPiece();trySnap();
}
holdBtn('cLeft', ()=>nudge(-14,0));
holdBtn('cRight',()=>nudge(14,0));
holdBtn('cUp',   ()=>nudge(0,-14));
holdBtn('cDown', ()=>nudge(0,14));
holdBtn('cRotL', ()=>rotate(-1),160);
holdBtn('cRotR', ()=>rotate(1),160);
$('cHint').onclick=()=>showHint();
$('cSkip').onclick=()=>skipPiece();

/* ---------- progress / finish ---------- */
function updateProg(){
  $('gProg').textContent=`${G.placed}/${G.queue.length}`;
}
function finish(){
  cancelAnimationFrame(G.raf);
  sndWin();
  $('game').classList.add('hidden');
  $('done').classList.remove('hidden');
  $('doneTitle').textContent=`${G.region} complete!`;
  const avg=G.score/Math.max(1,G.placed);
  const stars=avg>=80?3:avg>=55?2:1;
  $('doneStars').textContent='★★★'.slice(0,stars)+'☆☆☆'.slice(stars);
  $('doneStats').textContent=
    `${G.placed} countries placed · ${G.score} points · ${G.hintsUsed} hints · ${G.skips} skips`;
  const region=G.region;
  $('btnAgain').onclick=()=>startGame(region);
  $('btnMenu').onclick=goMenu;
}
function goMenu(){
  if(G){cancelAnimationFrame(G.raf);clearTimeout(G.hintTimer);G=null;}
  $('game').classList.add('hidden');$('done').classList.add('hidden');
  $('menu').classList.remove('hidden');
}
$('btnBack').onclick=goMenu;

buildMenu();
</script>
