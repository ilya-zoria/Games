<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Quiz World — Guess the Country</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#9adcff;
    --sky-bot:#d8f3ff;
    --cream:#fff6e3;
    --ink:#5b3a21;
    --red:#ef5d54;
    --green:#7fe0a1;
    --green-side:#4cb172;
    --red-side:#c2453d;
    --paper:#fdf3da;
    --paper-side:#cdbb93;
    --gold:#ffd95e;
    --gold-side:#d9a93c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Baloo 2','Arial Rounded MT Bold','Trebuchet MS',sans-serif;
    background:linear-gradient(180deg,var(--sky-top),var(--sky-bot) 70%,#eafaf0);
    color:var(--ink);
    min-height:100%;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none}
  .hidden{display:none !important}

  /* ---------- toy buttons ---------- */
  .toy{
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 4px 0 var(--paper-side), 0 8px 14px rgba(60,90,140,.18);
    color:var(--ink);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .toy:active{transform:translateY(3px);box-shadow:0 1px 0 var(--paper-side),0 4px 8px rgba(60,90,140,.18)}
  .toy:hover{filter:brightness(1.04)}

  /* ---------- MENU ---------- */
  #menu{max-width:1020px;margin:0 auto;padding:30px 20px 60px;text-align:center}
  .logo{
    font-size:clamp(36px,6vw,60px);font-weight:800;line-height:1.02;
    color:#fff;
    text-shadow:0 3px 0 #3f8fc4, 0 7px 16px rgba(30,80,130,.35);
    letter-spacing:.5px;
  }
  .logo .globe{display:inline-block;transform:rotate(-10deg)}
  .tagline{margin-top:10px;font-size:18px;color:#2a6a96;font-weight:600}
  .menu-grid{
    margin-top:28px;display:grid;gap:18px;
    grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  }
  .region-card{
    background:var(--cream);
    border-radius:24px;padding:14px 14px 12px;text-align:left;
    box-shadow:0 6px 0 var(--paper-side), 0 14px 24px rgba(60,90,140,.2);
    transition:transform .15s ease;
  }
  .region-card:hover,.region-card:focus-visible{transform:translateY(-5px) rotate(-.5deg);outline:none}
  .region-card:active{transform:translateY(0)}
  .region-card .rc-sky{
    background:linear-gradient(180deg,#aee2ff,#e3f6ff);
    border-radius:16px;padding:14px 8px;
    min-height:128px;display:flex;align-items:center;justify-content:center;
    flex-wrap:wrap;gap:4px;font-size:30px;line-height:1.25;
    overflow:hidden;
  }
  .region-card .rc-name{font-size:22px;font-weight:800;margin-top:10px;color:var(--ink)}
  .region-card .rc-count{font-size:14px;color:#9b7c5e;font-weight:600}
  .menu-opts{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .chip{padding:10px 20px;font-size:16px;font-weight:700;border-radius:999px}
  .chip[aria-pressed="true"]{background:var(--gold);box-shadow:0 4px 0 var(--gold-side),0 8px 14px rgba(60,90,140,.18)}

  /* ---------- NIGHT ---------- */
  body.night{background:linear-gradient(180deg,#1a2a6e,#33458f 70%,#27543a)}
  body.night .logo,body.night .tb-title{text-shadow:0 3px 0 #101b4d,0 7px 16px rgba(0,0,20,.5)}
  body.night .tagline{color:#bcd0ff}

  /* ---------- GAME ---------- */
  #game{max-width:760px;margin:0 auto;padding:10px 16px 40px}
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 2px 12px}
  .tb-btn{padding:9px 16px;font-size:16px;font-weight:700}
  .tb-title{
    font-size:26px;font-weight:800;margin-right:auto;color:#fff;
    text-shadow:0 2px 0 #3f8fc4,0 5px 10px rgba(30,80,130,.3);
  }
  .stat{background:var(--cream);border-radius:16px;padding:8px 15px;font-size:16px;font-weight:700;
    box-shadow:0 4px 0 var(--paper-side)}
  .stat b{color:var(--red)}

  .quiz-wrap{position:relative}
  .flag-card{
    position:relative;
    background:var(--cream);
    border-radius:28px;padding:30px 20px 26px;text-align:center;
    box-shadow:0 8px 0 var(--paper-side), 0 16px 30px rgba(60,90,140,.25);
    overflow:hidden;
  }
  .fc-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#b08d63;font-weight:700}
  .flag{
    font-size:clamp(96px,24vw,150px);line-height:1.15;margin:6px 0 2px;
    display:inline-block;
    filter:drop-shadow(0 8px 10px rgba(40,60,90,.25));
    user-select:none;
  }
  @keyframes flagIn{0%{transform:scale(.2) rotate(-12deg);opacity:0}70%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  .flag.pop{animation:flagIn .45s ease both}
  .fc-question{font-size:21px;font-weight:800;color:var(--ink)}
  .streak{
    position:absolute;right:16px;top:14px;
    background:var(--gold);border-radius:999px;padding:6px 14px;
    font-size:15px;font-weight:800;color:#6b4a00;
    box-shadow:0 3px 0 var(--gold-side);
  }

  .answers{
    margin-top:18px;display:grid;gap:14px;
    grid-template-columns:repeat(2,1fr);
  }
  @media (max-width:560px){.answers{grid-template-columns:1fr}}
  .ans{
    padding:16px 14px;font-size:19px;font-weight:800;border-radius:18px;
    min-height:64px;
  }
  .ans.correct{
    background:var(--green);color:#1e5c38;
    box-shadow:0 4px 0 var(--green-side),0 8px 14px rgba(60,90,140,.18);
    animation:popIn .35s ease both;
  }
  .ans.wrong{
    background:#ff9d94;color:#7a1f19;
    box-shadow:0 4px 0 var(--red-side),0 8px 14px rgba(60,90,140,.18);
    animation:shake .4s ease both;
  }
  .ans.dim{opacity:.55}
  .ans:disabled{cursor:default}
  .ans:disabled:hover{filter:none}
  @keyframes popIn{0%{transform:scale(.85)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

  .toast{
    position:absolute;left:50%;top:14px;transform:translateX(-50%) scale(.8);
    background:var(--gold);color:#6b4a00;font-weight:800;font-size:19px;
    border-radius:999px;padding:10px 24px;opacity:0;pointer-events:none;
    box-shadow:0 4px 0 var(--gold-side),0 10px 18px rgba(60,90,140,.25);
    transition:opacity .18s ease, transform .18s ease;
    white-space:nowrap;z-index:5;
  }
  .toast.show{opacity:1;transform:translateX(-50%) scale(1)}

  .confetti-bit{
    position:absolute;width:9px;height:9px;border-radius:50%;
    pointer-events:none;z-index:4;
  }

  .keys-hint{text-align:center;font-size:13px;color:#4a7da3;font-weight:600;margin-top:14px}
  body.night .keys-hint{color:#b9c8f5}

  /* ---------- DONE ---------- */
  #done{max-width:560px;margin:60px auto;padding:0 20px;text-align:center}
  .done-card{background:var(--cream);border-radius:28px;padding:38px 26px;
    box-shadow:0 8px 0 var(--paper-side),0 20px 34px rgba(60,90,140,.3)}
  .done-card h2{font-size:36px;font-weight:800}
  .stars{font-size:48px;letter-spacing:8px;margin:12px 0 4px;color:#f6b73c}
  .done-stats{font-size:17px;color:#9b7c5e;font-weight:600;margin-bottom:24px}
  .big-btn{font-size:20px;font-weight:800;border-radius:18px;padding:15px 28px;margin:6px;background:var(--gold);
    box-shadow:0 5px 0 var(--gold-side),0 10px 18px rgba(60,90,140,.2)}
  .big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--gold-side)}
  .big-btn.alt{background:var(--cream);box-shadow:0 5px 0 var(--paper-side),0 10px 18px rgba(60,90,140,.2)}
  .big-btn.alt:active{box-shadow:0 2px 0 var(--paper-side)}

  @media (prefers-reduced-motion:reduce){
    .flag.pop,.ans.correct,.ans.wrong{animation:none}
  }
</style>
</head>
<body>

<!-- ================= MENU ================= -->
<div id="menu">
  <h1 class="logo"><span class="globe">🚩</span> Flag Quiz World</h1>
  <p class="tagline">One flag flies in — pick the right country from four choices. How many can you guess?</p>
  <div class="menu-grid" id="menuGrid"></div>
  <div class="menu-opts">
    <button class="chip toy" id="optSound" aria-pressed="true">🔊 Sound: ON</button>
    <button class="chip toy" id="optNight" aria-pressed="false">🌞 Day</button>
  </div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="hidden">
  <div class="topbar">
    <button class="tb-btn toy" id="btnBack">← Regions</button>
    <div class="tb-title" id="gTitle">Europe</div>
    <div class="stat">⭐ <b id="gScore">0</b></div>
    <div class="stat">🚩 <b id="gProg">0/0</b></div>
    <button class="tb-btn toy" id="btnNight2">🌞</button>
    <button class="tb-btn toy" id="btnSound2">🔊</button>
  </div>

  <div class="quiz-wrap">
    <div class="flag-card" id="flagCard">
      <div class="streak hidden" id="streakBadge">🔥 x2</div>
      <div class="fc-label">Now flying</div>
      <div class="flag pop" id="flagBox">🏳️</div>
      <div class="fc-question">Which country is this?</div>
    </div>
    <div class="toast" id="toast">Nice!</div>
    <div class="answers" id="answers"></div>
    <div class="keys-hint">Tap an answer · or press 1 – 4 on the keyboard</div>
  </div>
</div>

<!-- ================= DONE ================= -->
<div id="done" class="hidden">
  <div class="done-card">
    <h2 id="doneTitle">Europe complete!</h2>
    <div class="stars" id="doneStars">★★★</div>
    <div class="done-stats" id="doneStats"></div>
    <button class="big-btn" id="btnAgain">Play again</button>
    <button class="big-btn alt" id="btnMenu">Choose region</button>
  </div>
</div>

<script>
/* ---------- country data: [name, iso] per region ---------- */
const DATA = {
"Europe":[["Sweden","SE"],["Ukraine","UA"],["France","FR"],["Finland","FI"],["Norway","NO"],["Spain","ES"],["Germany","DE"],["Poland","PL"],["Italy","IT"],["United Kingdom","GB"],["Belarus","BY"],["Romania","RO"],["Iceland","IS"],["Greece","GR"],["Bulgaria","BG"],["Hungary","HU"],["Austria","AT"],["Czechia","CZ"],["Portugal","PT"],["Latvia","LV"],["Lithuania","LT"],["Serbia","RS"],["Ireland","IE"],["Estonia","EE"],["Croatia","HR"],["Denmark","DK"],["Slovakia","SK"],["Bosnia and Herz.","BA"],["Switzerland","CH"],["Netherlands","NL"],["Moldova","MD"],["Belgium","BE"],["Albania","AL"],["North Macedonia","MK"],["Slovenia","SI"],["Montenegro","ME"],["Kosovo","XK"],["Luxembourg","LU"]],
"Asia":[["China","CN"],["Kazakhstan","KZ"],["India","IN"],["Mongolia","MN"],["Saudi Arabia","SA"],["Iran","IR"],["Indonesia","ID"],["Turkey","TR"],["Pakistan","PK"],["Afghanistan","AF"],["Myanmar","MM"],["Turkmenistan","TM"],["Uzbekistan","UZ"],["Thailand","TH"],["Iraq","IQ"],["Japan","JP"],["Yemen","YE"],["Vietnam","VN"],["Malaysia","MY"],["Oman","OM"],["Philippines","PH"],["Kyrgyzstan","KG"],["Laos","LA"],["Syria","SY"],["Cambodia","KH"],["Tajikistan","TJ"],["Nepal","NP"],["North Korea","KP"],["Bangladesh","BD"],["South Korea","KR"],["Azerbaijan","AZ"],["Jordan","JO"],["Georgia","GE"],["United Arab Emirates","AE"],["Sri Lanka","LK"],["Bhutan","BT"],["Armenia","AM"],["Taiwan","TW"],["Israel","IL"],["Kuwait","KW"],["Timor-Leste","TL"],["Qatar","QA"],["Lebanon","LB"],["Brunei","BN"],["Cyprus","CY"],["Palestine","PS"]],
"Africa":[["Algeria","DZ"],["Dem. Rep. Congo","CD"],["Sudan","SD"],["Libya","LY"],["South Africa","ZA"],["Chad","TD"],["Mali","ML"],["Angola","AO"],["Niger","NE"],["Ethiopia","ET"],["Mauritania","MR"],["Egypt","EG"],["Tanzania","TZ"],["Nigeria","NG"],["Namibia","NA"],["Mozambique","MZ"],["Zambia","ZM"],["Morocco","MA"],["Botswana","BW"],["S. Sudan","SS"],["Central African Rep.","CF"],["Madagascar","MG"],["Kenya","KE"],["Somalia","SO"],["Cameroon","CM"],["Zimbabwe","ZW"],["Congo","CG"],["Côte d'Ivoire","CI"],["Burkina Faso","BF"],["Gabon","GA"],["Ghana","GH"],["Uganda","UG"],["Guinea","GN"],["Senegal","SN"],["Tunisia","TN"],["Eritrea","ER"],["Benin","BJ"],["Malawi","MW"],["Liberia","LR"],["Sierra Leone","SL"],["Togo","TG"],["Guinea-Bissau","GW"],["Lesotho","LS"],["Eq. Guinea","GQ"],["Burundi","BI"],["Rwanda","RW"],["Djibouti","DJ"],["eSwatini","SZ"],["Gambia","GM"]],
"North America":[["Canada","CA"],["United States of America","US"],["Greenland","GL"],["Mexico","MX"],["Nicaragua","NI"],["Cuba","CU"],["Honduras","HN"],["Guatemala","GT"],["Panama","PA"],["Costa Rica","CR"],["Dominican Rep.","DO"],["Haiti","HT"],["Belize","BZ"],["El Salvador","SV"],["Bahamas","BS"],["Jamaica","JM"],["Trinidad and Tobago","TT"]],
"South America":[["Brazil","BR"],["Argentina","AR"],["Peru","PE"],["Colombia","CO"],["Bolivia","BO"],["Chile","CL"],["Venezuela","VE"],["Paraguay","PY"],["Ecuador","EC"],["Guyana","GY"],["Uruguay","UY"],["Suriname","SR"]],
"Oceania":[["Australia","AU"],["Papua New Guinea","PG"],["New Zealand","NZ"],["Solomon Is.","SB"],["Fiji","FJ"],["Vanuatu","VU"]]
};

/* ---------- friendly names / flags ---------- */
const NICE = {
  'United States of America':'United States','Dem. Rep. Congo':'DR Congo',
  'Central African Rep.':'Central African Republic','Eq. Guinea':'Equatorial Guinea',
  'S. Sudan':'South Sudan','Bosnia and Herz.':'Bosnia & Herzegovina',
  'Dominican Rep.':'Dominican Republic','Solomon Is.':'Solomon Islands'
};
const niceName = n => NICE[n] || n;
const flagEmoji = iso => (!iso || iso.length!==2) ? '🏳️' :
  String.fromCodePoint(...[...iso.toUpperCase()].map(c=>0x1F1A5+c.charCodeAt(0)));

const REGION_EMOJI = {'Europe':'🏰','Asia':'🐉','Africa':'🦁',
  'North America':'🗽','South America':'🦜','Oceania':'🦘','Whole World':'🌍'};

const PALETTE = ['#ff8c7a','#ffd066','#7fe0a1','#7fcdf2','#d3a4f0','#ffb084',
  '#a6e386','#ff9fc0','#8de3d6','#f2e07a','#aab4ff','#ffc4a8'];

/* ---------- global state ---------- */
let soundOn = true, night = false;
let G = null;
const $ = id => document.getElementById(id);

/* ---------- audio ---------- */
let AC=null;
function beep(freq,dur=0.09,type='triangle',vol=0.18,when=0){
  if(!soundOn) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+when+dur);
    o.connect(g).connect(AC.destination);
    o.start(AC.currentTime+when);o.stop(AC.currentTime+when+dur+0.02);
  }catch(e){}
}
const sndRight=()=>{beep(523,0.1);beep(784,0.14,'triangle',0.18,0.09);};
const sndWrong=()=>beep(196,0.22,'sawtooth',0.08);
const sndWin  =()=>[523,659,784,1047].forEach((f,i)=>beep(f,0.16,'triangle',0.2,i*0.13));

/* ---------- helpers ---------- */
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---------- menu ---------- */
function buildMenu(){
  const grid=$('menuGrid'); grid.innerHTML='';
  const regions = Object.entries(DATA);
  const all = regions.flatMap(([,c])=>c);
  const entries = [...regions, ['Whole World', all]];
  for(const [region,countries] of entries){
    const card=document.createElement('button');
    card.className='region-card';
    const preview = shuffle(countries).slice(0,12)
      .map(([,iso])=>flagEmoji(iso)).join(' ');
    card.innerHTML=`
      <div class="rc-sky">${preview}</div>
      <div class="rc-name">${REGION_EMOJI[region]||'🌍'} ${region}</div>
      <div class="rc-count">${countries.length} flags to guess</div>`;
    card.onclick=()=>startGame(region);
    grid.appendChild(card);
  }
}
function setSound(v){
  soundOn=v;
  $('optSound').setAttribute('aria-pressed',v);
  $('optSound').textContent=`🔊 Sound: ${v?'ON':'OFF'}`;
  $('btnSound2').textContent=v?'🔊':'🔇';
}
function setNight(v){
  night=v;
  document.body.classList.toggle('night',v);
  $('optNight').setAttribute('aria-pressed',v);
  $('optNight').textContent=v?'🌙 Night':'🌞 Day';
  $('btnNight2').textContent=v?'🌙':'🌞';
}
$('optSound').onclick=()=>setSound(!soundOn);
$('btnSound2').onclick=()=>setSound(!soundOn);
$('optNight').onclick=()=>setNight(!night);
$('btnNight2').onclick=()=>setNight(!night);

/* ---------- game ---------- */
const ROUND_LIMIT = 15;            // questions per game (or fewer if region is small)

function startGame(region){
  const pool = region==='Whole World'
    ? Object.values(DATA).flat()
    : DATA[region];
  const queue = shuffle(pool).slice(0, Math.min(ROUND_LIMIT, pool.length));
  G = {
    region, pool, queue, idx:0,
    score:0, correct:0, streak:0, best:0,
    locked:false
  };
  $('menu').classList.add('hidden');$('done').classList.add('hidden');
  $('game').classList.remove('hidden');
  $('gTitle').textContent=`${REGION_EMOJI[region]||''} ${region}`;
  $('gScore').textContent='0';
  nextQuestion();
}

function nextQuestion(){
  if(G.idx>=G.queue.length){finish();return;}
  G.locked=false;
  const answer = G.queue[G.idx];
  const wrong = shuffle(G.pool.filter(c=>c[0]!==answer[0])).slice(0,3);
  const options = shuffle([answer, ...wrong]);

  const flag=$('flagBox');
  flag.classList.remove('pop'); void flag.offsetWidth;   // restart animation
  flag.textContent=flagEmoji(answer[1]);
  flag.classList.add('pop');

  const box=$('answers'); box.innerHTML='';
  options.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='ans toy';
    b.textContent=`${i+1}. ${niceName(c[0])}`;
    b.dataset.name=c[0];
    b.onclick=()=>choose(b, c[0]===answer[0]);
    box.appendChild(b);
  });

  updateProg();
  updateStreak();
}

function choose(btn, isRight){
  if(G.locked) return;
  G.locked=true;
  const buttons=[...$('answers').children];
  const answerName=G.queue[G.idx][0];
  buttons.forEach(b=>b.disabled=true);

  if(isRight){
    btn.classList.add('correct');
    buttons.filter(b=>b!==btn).forEach(b=>b.classList.add('dim'));
    G.streak++; G.best=Math.max(G.best,G.streak);
    const pts = 100 + (G.streak>=3 ? (G.streak-2)*20 : 0);
    G.score+=pts; G.correct++;
    $('gScore').textContent=G.score;
    sndRight();
    confetti();
    showToast(`${pickPraise()}  +${pts}`);
  }else{
    btn.classList.add('wrong');
    G.streak=0;
    const right=buttons.find(b=>b.dataset.name===answerName);
    if(right) right.classList.add('correct');
    buttons.filter(b=>b!==btn&&b!==right).forEach(b=>b.classList.add('dim'));
    sndWrong();
    showToast(`It was ${niceName(answerName)}!`);
  }
  updateStreak();
  G.idx++;
  setTimeout(nextQuestion, isRight ? 950 : 1500);
}

document.addEventListener('keydown',e=>{
  if(!G || $('game').classList.contains('hidden')) return;
  const n=parseInt(e.key,10);
  if(n>=1 && n<=4){
    const b=$('answers').children[n-1];
    if(b && !b.disabled) b.click();
  }
});

/* ---------- feedback ---------- */
const PRAISE=['Nice!','Great eye!','Perfect!','You got it!','Awesome!','Boom!','Flag master!'];
const pickPraise=()=>PRAISE[Math.floor(Math.random()*PRAISE.length)];
let toastT=null;
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1300);
}

function confetti(){
  const card=$('flagCard');
  const w=card.clientWidth, h=card.clientHeight;
  for(let i=0;i<16;i++){
    const c=document.createElement('div');
    c.className='confetti-bit';
    c.style.background=PALETTE[Math.floor(Math.random()*PALETTE.length)];
    c.style.left=(w/2)+'px'; c.style.top=(h*0.45)+'px';
    card.appendChild(c);
    const a=Math.random()*Math.PI*2, r=50+Math.random()*90;
    c.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${Math.cos(a)*r}px,${Math.sin(a)*r-30}px)`,opacity:0}
    ],{duration:650+Math.random()*250,easing:'cubic-bezier(.2,.7,.3,1)'})
     .onfinish=()=>c.remove();
  }
}

function updateProg(){
  $('gProg').textContent=`${G.idx+ (G.locked?1:0)}/${G.queue.length}`;
}
function updateStreak(){
  const b=$('streakBadge');
  if(G.streak>=2){b.classList.remove('hidden');b.textContent=`🔥 x${G.streak}`;}
  else b.classList.add('hidden');
}

/* ---------- finish ---------- */
function finish(){
  sndWin();
  $('game').classList.add('hidden');
  $('done').classList.remove('hidden');
  $('doneTitle').textContent=`${G.region} complete!`;
  const acc=G.correct/Math.max(1,G.queue.length);
  const stars=acc>=0.85?3:acc>=0.6?2:1;
  $('doneStars').textContent='★★★'.slice(0,stars)+'☆☆☆'.slice(stars);
  $('doneStats').textContent=
    `${G.correct}/${G.queue.length} flags guessed · ${G.score} points · best streak x${G.best}`;
  const region=G.region;
  $('btnAgain').onclick=()=>startGame(region);
  $('btnMenu').onclick=goMenu;
}
function goMenu(){
  G=null;
  $('game').classList.add('hidden');$('done').classList.add('hidden');
  $('menu').classList.remove('hidden');
}
$('btnBack').onclick=goMenu;

buildMenu();
</script>
</body>
